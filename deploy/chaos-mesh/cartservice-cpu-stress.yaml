apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cartservice-cpu-stress
  namespace: online-boutique
spec:
  mode: one
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: cartservice
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "5m"
