apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-recommendation
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces: [online-boutique]
    labelSelectors:
      app: recommendationservice
  duration: "5m"
  scheduler:
    cron: "@every 30s"
